<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serverless URL Shortener</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #007bff;
            --primary-hover: #0056b3;
            --background-color: #f4f7f6;
            --text-color: #333333;
            --card-bg: #ffffff;
            --border-color: #dddddd;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 2vh;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input[type="url"] {
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 5px;
            text-align: center;
            word-break: break-all;
            display: none; 
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px; 
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: var(--primary-color);
            color: white;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        @media (min-width: 600px) {
            .input-group {
                flex-direction: row;
            }
            input[type="url"] {
                flex: 1;
            }
            button {
                width: auto;
                min-width: 130px;
            }
        }

        @media (max-width: 600px) {
            .card {
                padding: 15px;
            }
            th, td {
                padding: 10px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    
    <div class="container">
        
        <div class="card">
            <h2><i class="fa-solid fa-link"></i> Shorten URL</h2>
            <div class="input-group">
                <input type="url" id="longUrl" placeholder="Enter long URL (https://...)" required>
                <button onclick="shortenUrl()"><i class="fa-solid fa-compress"></i> Shorten</button>
            </div>
            <div id="result" class="result-box"></div>
        </div>

        <div class="card">
            <h2><i class="fa-solid fa-chart-line"></i> Link Analytics</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th><i class="fa-solid fa-link"></i> Short Code</th>
                            <th><i class="fa-solid fa-globe"></i> Original URL</th>
                            <th><i class="fa-solid fa-mouse-pointer"></i> Clicks</th>
                            <th><i class="fa-solid fa-calendar-days"></i> Created</th>
                        </tr>
                    </thead>
                    <tbody id="analyticsBody">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // 1. Send the URL to the Vercel API to be shortened
        async function shortenUrl() {
            const longUrl = document.getElementById('longUrl').value;
            const resultDiv = document.getElementById('result');

            resultDiv.style.display = 'block';

            if (!longUrl) {
                resultDiv.innerHTML = '<span style="color:red;"><i class="fa-solid fa-triangle-exclamation"></i> Please enter a valid URL.</span>';
                return;
            }

            resultDiv.innerHTML = '<span style="color:#555;"><i class="fa-solid fa-spinner fa-spin"></i> Shortening your link...</span>';

            try {
                const response = await fetch('/api/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ original_url: longUrl })
                });
                
                const data = await response.json();

                if (response.ok) {
                    resultDiv.innerHTML = `<span style="color:green;"><i class="fa-solid fa-circle-check"></i> Success!</span><br><br>Shortened: <a href="${data.short_url}" target="_blank">${data.short_url}</a>`;
                    fetchAnalytics(); // Instantly refresh the table
                } else {
                    resultDiv.innerHTML = `<span style="color:red;"><i class="fa-solid fa-circle-xmark"></i> ${data.error || 'Error shortening URL.'}</span>`;
                }
            } catch (error) {
                resultDiv.innerHTML = '<span style="color:red;"><i class="fa-solid fa-triangle-exclamation"></i> Network error. Please try again.</span>';
            }
        }

        // 2. Ask the Vercel API for the dashboard data
        async function fetchAnalytics() {
            const tableBody = document.getElementById('analyticsBody');
            
            tableBody.innerHTML = '<tr><td colspan="4" class="loading"><i class="fa-solid fa-spinner fa-spin"></i> Loading data...</td></tr>';

            try {
                const response = await fetch('/api/analytics');
                const data = await response.json();

                tableBody.innerHTML = ''; 

                if (!data || data.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center;"><i class="fa-solid fa-folder-open"></i> No links found yet.</td></tr>';
                    return;
                }

                data.forEach(item => {
                    const row = `
                        <tr>
                            <td><strong>${item.short_code}</strong></td>
                            <td><a href="${item.original_url}" target="_blank">${item.original_url.substring(0, 30)}...</a></td>
                            <td>${item.clicks}</td>
                            <td>${new Date(item.created_at).toLocaleDateString()}</td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            } catch (error) {
                tableBody.innerHTML = '<tr><td colspan="4" style="color:red; text-align:center;"><i class="fa-solid fa-triangle-exclamation"></i> Error loading analytics data.</td></tr>';
            }
        }

        // 3. Trigger the fetch automatically on load
        window.onload = fetchAnalytics;
    </script>

</body>
</html>
